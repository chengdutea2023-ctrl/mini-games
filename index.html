<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小游戏合集</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050814;
        color: #ecfeff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 18% 18%, rgba(36, 247, 255, 0.22), transparent 30%),
          radial-gradient(circle at 78% 72%, rgba(255, 43, 214, 0.18), transparent 32%),
          #050814;
      }
      main {
        width: min(100%, 860px);
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(36px, 7vw, 68px);
        line-height: 1;
        text-shadow: 3px 0 0 rgba(255, 43, 214, 0.8), -3px 0 0 rgba(36, 247, 255, 0.8);
      }
      p {
        margin: 0 0 24px;
        color: #a9d5e4;
        line-height: 1.7;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }
      a {
        display: block;
        min-height: 150px;
        padding: 18px;
        border: 1px solid rgba(36, 247, 255, 0.62);
        border-radius: 8px;
        color: inherit;
        text-decoration: none;
        background:
          linear-gradient(135deg, rgba(36, 247, 255, 0.12), transparent 34%),
          linear-gradient(315deg, rgba(255, 43, 214, 0.14), transparent 34%),
          rgba(5, 14, 34, 0.82);
        box-shadow: 0 0 26px rgba(36, 247, 255, 0.14), inset 0 0 24px rgba(255, 43, 214, 0.08);
      }
      a:hover {
        border-color: #ff2bd6;
        transform: translateY(-2px);
      }
      strong {
        display: block;
        margin-bottom: 10px;
        font-size: 24px;
        color: #fff;
      }
      span {
        color: #c9fbff;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>小游戏合集</h1>
      <p>这里集中管理和展示我的小游戏项目。</p>
      <div class="grid">
        <a href="./game1/">
          <strong>霓虹空袭</strong>
          <span>赛博朋克风打飞机小游戏，支持键盘、鼠标和触摸操作。</span>
        </a>
        <a href="./game2/">
          <strong>霓虹空袭体感控制版</strong>
          <span>基于霓虹空袭复制出的体感控制版本，保留原玩法，后续可继续接入体感输入。</span>
        </a>
      </div>
    </main>
  </body>
</html>
